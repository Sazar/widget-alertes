<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Widget alertes Twitch animé pour StreamElements (follower, sub, bits, raid, don)">
  <title>Widget Alertes Twitch</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Montserrat:wght@700;900&family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&family=Poppins:wght@600;700;900&display=swap" rel="stylesheet">
  <!-- Widget styles -->
  <link rel="stylesheet" href="widget.css">
</head>
<body>

<!-- Conteneur principal du widget -->
<div id="alert-wrapper" class="hidden">

  <!-- Bandeau d'alerte -->
  <div id="alert-box">

    <!-- Badge type d'alerte -->
    <div id="alert-type-badge"></div>

    <!-- Icone / Avatar -->
    <div id="alert-icon-wrap">
      <div id="alert-icon-ring"></div>
      <div id="alert-icon">⚡</div>
      <canvas id="particles-canvas" width="140" height="140"></canvas>
    </div>

    <!-- Contenu texte -->
    <div id="alert-content">
      <div id="alert-username">Username</div>
      <div id="alert-message">Message d'alerte</div>
      <div id="alert-sub-message"></div>
    </div>

    <!-- Barre de progression -->
    <div id="alert-progress-bar">
      <div id="alert-progress-fill"></div>
    </div>

  </div>

  <!-- Effets d'arrière-plan -->
  <div id="alert-bg-glow"></div>

</div>

<!-- Confetti (hors alert-box pour couvrir tout l'écran) -->
<div id="confetti-container"></div>

<!-- Audio (chargé dynamiquement par JS) -->
<audio id="alert-sound" preload="auto"></audio>

<!-- Widget script -->
<script src="widget.js"></script>

</body>
</html>
